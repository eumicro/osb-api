name: Container Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag or SHA). Empty = default branch tip."
        required: false
        type: string
        default: ""
      push_images:
        description: "Push images to GHCR"
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build (tag or SHA). Empty = default checkout ref."
        required: false
        type: string
        default: ""
      push_images:
        description: "Push images to GHCR"
        required: false
        type: boolean
        default: true

concurrency:
  group: container-images-${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: ${{ matrix.image_suffix }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: osb-api
            image_suffix: osb-api
            needs_node: false
          - module: osb-bff
            image_suffix: osb-bff
            needs_node: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js
        if: matrix.needs_node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Package ${{ matrix.module }}
        run: |
          chmod +x mvnw
          ./mvnw -B -pl ${{ matrix.module }} -am package -DskipTests

      - name: Image name (lowercase)
        id: image
        run: |
          owner_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${owner_repo}/${{ matrix.image_suffix }}" >> "$GITHUB_OUTPUT"

      # workflow_call keeps the caller's event_name (often "push"); detect release
      # publishes via non-empty inputs.ref instead of event_name == workflow_call.
      - name: Resolve publish context
        id: pub
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_PUSH: ${{ inputs.push_images }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PUSH=true
          SEMVER_VALUE=""
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            PUSH=false
          elif [[ -n "${INPUT_REF}" ]]; then
            PUSH="${INPUT_PUSH:-true}"
            SEMVER_VALUE="${INPUT_REF}"
          elif [[ "${REF_TYPE}" == "tag" && "${REF_NAME}" == v* ]]; then
            SEMVER_VALUE="${REF_NAME}"
          fi
          if [[ -n "${SEMVER_VALUE}" && "${SEMVER_VALUE}" != v* ]]; then
            SEMVER_VALUE="v${SEMVER_VALUE}"
          fi
          if [[ -n "${SEMVER_VALUE}" ]]; then
            IS_RELEASE=true
          else
            IS_RELEASE=false
          fi
          echo "push_enabled=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "semver_value=${SEMVER_VALUE}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.image_suffix }}
            org.opencontainers.image.description=OSB ${{ matrix.image_suffix }} JVM image (Compose / Kind)
          tags: |
            type=ref,event=branch,enable=${{ steps.pub.outputs.is_release != 'true' }}
            type=ref,event=pr
            type=semver,pattern={{version}},enable=${{ steps.pub.outputs.is_release != 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.pub.outputs.is_release != 'true' }}
            type=semver,pattern={{version}},value=${{ steps.pub.outputs.semver_value }},enable=${{ steps.pub.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.pub.outputs.semver_value }},enable=${{ steps.pub.outputs.is_release == 'true' }}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && (steps.pub.outputs.is_release == 'true' || github.ref_name == github.event.repository.default_branch) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.pub.outputs.push_enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.module }}
          file: ${{ matrix.module }}/src/main/docker/Dockerfile.jvm
          push: ${{ steps.pub.outputs.push_enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_suffix }}

name: Helm Chart

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version (SemVer without v). Empty = Chart.yaml"
        required: false
        type: string
        default: ""
      push_chart:
        description: "Push OCI chart to GHCR"
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      ref:
        description: "Git ref to package (release tag)"
        required: false
        type: string
        default: ""
      version:
        description: "Chart / app version (SemVer without v)"
        required: false
        type: string
        default: ""
      push_chart:
        description: "Push OCI chart to GHCR"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: helm-${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  CHART_DIR: charts/osb
  REGISTRY: ghcr.io

jobs:
  lint-and-publish:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Resolve versions
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif [[ -n "${INPUT_REF}" && "${INPUT_REF}" == v* ]]; then
            VERSION="${INPUT_REF#v}"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(awk '/^version:/{print $2; exit}' "${CHART_DIR}/Chart.yaml")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          owner_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "oci_base=${{ env.REGISTRY }}/${owner_repo}" >> "$GITHUB_OUTPUT"

      - name: Sync Chart.yaml versions (publish path)
        if: >-
          github.event_name == 'workflow_call' ||
          (github.event_name == 'workflow_dispatch' && inputs.push_chart)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_DIR}/Chart.yaml"
          cat "${CHART_DIR}/Chart.yaml"

      - name: Helm lint
        run: helm lint "${CHART_DIR}"

      - name: Helm template (smoke)
        run: |
          helm template osb "${CHART_DIR}" \
            --set config.postgres.password=test \
            --set ingress.enabled=true \
            > /tmp/osb-rendered.yaml
          wc -l /tmp/osb-rendered.yaml

      - name: Package chart
        run: |
          helm package "${CHART_DIR}" --destination /tmp/helm-out
          ls -la /tmp/helm-out

      - name: Decide push
        id: push
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "enabled=${{ inputs.push_chart }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=${{ inputs.push_chart }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.push.outputs.enabled == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Push OCI chart
        if: steps.push.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          OCI_BASE: ${{ steps.ver.outputs.oci_base }}
        run: |
          set -euo pipefail
          PKG="/tmp/helm-out/osb-${VERSION}.tgz"
          if [[ ! -f "${PKG}" ]]; then
            PKG=$(ls /tmp/helm-out/osb-*.tgz | head -1)
          fi
          echo "Pushing ${PKG} → oci://${OCI_BASE}"
          helm push "${PKG}" "oci://${OCI_BASE}"
          echo "Install: helm install osb oci://${OCI_BASE}/osb --version ${VERSION}"

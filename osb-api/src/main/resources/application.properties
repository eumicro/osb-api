quarkus.application.name=osb-api
quarkus.http.port=8080
# Reachable from n8n in podman/docker (host.docker.internal / WSL vEthernet)
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-broker-api-version
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS

# Debug attach (Cursor/VS Code launch.json → port 5005)
quarkus.debug.port=5005
quarkus.debug.suspend=false

# Platform services (override per env: local defaults, Compose, staging, prod)
osb.postgres.jdbc-url=jdbc:postgresql://localhost:5432/osb
osb.postgres.username=osb
osb.postgres.password=osb
osb.keycloak.url=http://localhost:8180
osb.keycloak.realm=osb
# Prefer 127.0.0.1: n8n (Podman port publish) listens on IPv4 only; Java localhost → ::1 times out.
osb.n8n.base-url=http://127.0.0.1:5678
osb.n8n.invoke-webhooks=true
# Shared with n8n custom nodes (X-OSB-Workflow-Token)
osb.n8n.client-token=${OSB_N8N_CLIENT_TOKEN:osb-n8n-client-dev-secret}

# Never start Quarkus/Testcontainers databases — use the configured Postgres.
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${osb.postgres.username}
quarkus.datasource.password=${osb.postgres.password}
quarkus.datasource.jdbc.url=${osb.postgres.jdbc-url}
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.packages=io.osb.infrastructure.persistence.entity
# JSON columns (plan schemas): do not reuse REST ObjectMapper / jackson.write-dates-as-timestamps
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
# BFF shares DB "osb" and may create tables first (bff_*). Allow migrate on non-empty schema.
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
# Keep domain template tokens (${instanceId}, ...) literal in SQL seeds/comments.
# Quarkus has no placeholder-replacement=false; move Flyway delimiters out of the way.
quarkus.flyway.placeholder-prefix=FLW__
quarkus.flyway.placeholder-suffix=__
# Local seed iteration: reconcile checksums when V* SQL files change after apply.
%dev.quarkus.flyway.repair-at-start=true
# %dev.quarkus.oidc.auth-server-url=${osb.keycloak.url}/realms/${osb.keycloak.realm}

quarkus.index-dependency.osb.group-id=io.osb
quarkus.index-dependency.osb.artifact-id=osb
quarkus.index-dependency.osb-workflow.group-id=io.osb
quarkus.index-dependency.osb-workflow.artifact-id=osb-workflow
quarkus.index-dependency.osb-workflow-n8n.group-id=io.osb
quarkus.index-dependency.osb-workflow-n8n.artifact-id=osb-workflow-n8n
quarkus.index-dependency.osb-auth2.group-id=io.osb
quarkus.index-dependency.osb-auth2.artifact-id=osb-auth2
quarkus.index-dependency.osb-infrastructure-persistence.group-id=io.osb
quarkus.index-dependency.osb-infrastructure-persistence.artifact-id=osb-infrastructure-persistence
quarkus.index-dependency.osb-infrastructure-git.group-id=io.osb
quarkus.index-dependency.osb-infrastructure-git.artifact-id=osb-infrastructure-git
quarkus.index-dependency.osb-infrastructure-kubernetes.group-id=io.osb
quarkus.index-dependency.osb-infrastructure-kubernetes.artifact-id=osb-infrastructure-kubernetes
quarkus.index-dependency.osb-infrastructure-http-client.group-id=io.osb
quarkus.index-dependency.osb-infrastructure-http-client.artifact-id=osb-infrastructure-http-client

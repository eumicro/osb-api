# Activated with QUARKUS_PROFILE=compose (osb-bff in docker-compose).
osb.postgres.jdbc-url=jdbc:postgresql://postgres:5432/osb
osb.bff.api-url=http://osb-api:8080
osb.bff.n8n.base-url=http://n8n:5678

# Backchannel → Keycloak service; browser-facing endpoints stay on localhost:8180.
quarkus.oidc.auth-server-url=http://keycloak:8080/realms/osb
quarkus.oidc.token.issuer=http://localhost:8180/realms/osb
quarkus.oidc.discovery-enabled=false
quarkus.oidc.authorization-path=http://localhost:8180/realms/osb/protocol/openid-connect/auth
quarkus.oidc.token-path=/protocol/openid-connect/token
quarkus.oidc.jwks-path=/protocol/openid-connect/certs
quarkus.oidc.end-session-path=http://localhost:8180/realms/osb/protocol/openid-connect/logout

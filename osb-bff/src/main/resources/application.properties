# --- HTTP --------------------------------------------------------------------
quarkus.http.port=8081
quarkus.application.name=osb-bff
# Avoid clashing with osb-api debug port 5005
quarkus.debug.port=5006
quarkus.debug.suspend=false

# --- OIDC / Keycloak (web-app, Authorization Code Flow) -----------------------
# Uses osb-devservices Keycloak (realm osb). Disable Quarkus Keycloak DevServices.
quarkus.keycloak.devservices.enabled=false
quarkus.oidc.auth-server-url=http://localhost:8180/realms/osb
quarkus.oidc.client-id=osb-bff
quarkus.oidc.credentials.secret=osb-bff-dev-secret
quarkus.oidc.application-type=web-app
quarkus.oidc.connection-delay=3M
quarkus.oidc.logout.path=/bff/logout
quarkus.oidc.logout.post-logout-path=/

# Public health; everything else authenticated (Same-Origin UI via BFF → no CORS).
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.app.paths=/*
quarkus.http.auth.permission.app.policy=authenticated

# --- Upstream OSB API ---------------------------------------------------------
osb.bff.api-url=http://localhost:8080

# --- n8n embed (session propagation ticket; shared with osb-devservices n8n) ---
osb.bff.n8n.base-url=http://localhost:5678
osb.bff.n8n.bridge-secret=osb-n8n-bridge-dev-secret
# Prefer ID-token claims (email/name) for the bridge ticket
quarkus.oidc.authentication.user-info-required=false

# --- UI config (Postgres; legacy files imported once if present) --------------
osb.bff.ui-config-dir=data/ui-config
osb.postgres.jdbc-url=jdbc:postgresql://localhost:5432/osb
osb.postgres.username=osb
osb.postgres.password=osb
# Never start Quarkus/Testcontainers databases — use the configured Postgres.
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${osb.postgres.username}
quarkus.datasource.password=${osb.postgres.password}
quarkus.datasource.jdbc.url=${osb.postgres.jdbc-url}
# Separate Flyway history from osb-api (same database / shared public schema)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.table=bff_flyway_schema_history
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
# Same as osb-api: do not treat ${...} in SQL as Flyway placeholders.
quarkus.flyway.placeholder-prefix=FLW__
quarkus.flyway.placeholder-suffix=__


# --- Quinoa (serves ../frontend, Vite HMR in dev) -----------------------------
quarkus.quinoa.ui-dir=../frontend
quarkus.quinoa.build-dir=dist
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true

# Profile: local UI without login (Keycloak optional)
%no-auth.quarkus.oidc.tenant-enabled=false
%no-auth.quarkus.http.auth.permission.app.policy=permit

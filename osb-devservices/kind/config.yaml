# Kind cluster for local OSB provision/deprovision tests.
# Host ports 8088/8443 (not 80/443): Podman/WSL often blackholes privileged host :80.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: osb
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8088
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
networking:
  # Bind all interfaces so Compose app containers can reach Kind via host.docker.internal:6443.
  # 127.0.0.1-only is unreachable from Podman/Docker containers on Windows/WSL.
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443

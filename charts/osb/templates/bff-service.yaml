{{- if .Values.bff.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "osb.bff.fullname" . }}
  labels:
    {{- include "osb.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
spec:
  type: {{ .Values.bff.service.type }}
  ports:
    - port: {{ .Values.bff.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "osb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bff
{{- end }}

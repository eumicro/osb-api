{{- if .Values.bff.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "osb.bff.fullname" . }}
  labels:
    {{- include "osb.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
spec:
  replicas: {{ .Values.bff.replicaCount }}
  selector:
    matchLabels:
      {{- include "osb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bff
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "osb.labels" . | nindent 8 }}
        app.kubernetes.io/component: bff
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "osb.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: osb-bff
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: {{ include "osb.bff.image" . }}
          imagePullPolicy: {{ .Values.bff.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            {{- if .Values.config.quarkusProfile }}
            - name: QUARKUS_PROFILE
              value: {{ .Values.config.quarkusProfile | quote }}
            {{- end }}
            - name: OSB_POSTGRES_JDBC_URL
              value: {{ .Values.config.postgres.jdbcUrl | quote }}
            - name: OSB_POSTGRES_USERNAME
              value: {{ .Values.config.postgres.username | quote }}
            - name: OSB_BFF_API_URL
              value: {{ include "osb.apiUrl" . | quote }}
            - name: OSB_BFF_N8N_BASE_URL
              value: {{ .Values.config.n8n.baseUrl | quote }}
            - name: QUARKUS_OIDC_AUTH_SERVER_URL
              value: {{ .Values.config.keycloak.authServerUrl | quote }}
            - name: QUARKUS_OIDC_TOKEN_ISSUER
              value: {{ .Values.config.keycloak.tokenIssuer | quote }}
            - name: QUARKUS_OIDC_DISCOVERY_ENABLED
              value: {{ .Values.config.keycloak.discoveryEnabled | quote }}
            - name: QUARKUS_OIDC_AUTHORIZATION_PATH
              value: {{ .Values.config.keycloak.authorizationPath | quote }}
            - name: QUARKUS_OIDC_TOKEN_PATH
              value: {{ .Values.config.keycloak.tokenPath | quote }}
            - name: QUARKUS_OIDC_JWKS_PATH
              value: {{ .Values.config.keycloak.jwksPath | quote }}
            - name: QUARKUS_OIDC_END_SESSION_PATH
              value: {{ .Values.config.keycloak.endSessionPath | quote }}
            {{- range $k, $v := .Values.bff.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            {{- if or .Values.config.postgres.password .Values.config.n8n.clientToken .Values.config.n8n.bridgeSecret }}
            - secretRef:
                name: {{ include "osb.fullname" . }}-credentials
            {{- end }}
            {{- if .Values.bff.existingSecret }}
            - secretRef:
                name: {{ .Values.bff.existingSecret }}
            {{- end }}
            {{- if .Values.bff.existingConfigMap }}
            - configMapRef:
                name: {{ .Values.bff.existingConfigMap }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.bff.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
